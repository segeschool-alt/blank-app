<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Pay Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .hidden { display: none; }
        .card { background: #1e293b; padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid #3b82f6; }
        button { background: #3b82f6; color: white; border: none; padding: 10px; width: 100%; border-radius: 8px; cursor: pointer; margin-top: 5px; }
        input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 5px; border: none; }
    </style>
</head>
<body>
    <div id="gatekeeper" class="hidden">
        <h2>Welcome to Click Pay</h2>
        <button onclick="window.open('https://t.me/click_Pay_official_Channel', '_blank')">Join Channel to Continue</button>
    </div>

    <div id="dashboard" class="hidden">
        <h2 id="welcome"></h2>
        <div class="card">Balance: <span id="balance">0</span> Birr</div>
        
        <h3>Referrals</h3>
        <button onclick="copyLink()">Copy Referral Link</button>

        <h3>Tasks</h3>
        <button onclick="verifyTask(10)">Join Channel (+10 Birr)</button>

        <h3>Withdraw</h3>
        <select id="method"><option>Telebirr</option><option>CBE</option><option>BoA</option></select>
        <input id="accNum" placeholder="Account Number">
        <input id="accName" placeholder="Account Name">
        <button onclick="withdraw()">Submit Withdrawal</button>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        const userId = tg.initDataUnsafe.user.id;
        const api = "http://localhost:3000";

        async function init() {
            const res = await fetch(`${api}/api/check-member/${userId}`);
            const data = await res.json();
            if (data.isMember) {
                document.getElementById('dashboard').classList.remove('hidden');
                document.getElementById('welcome').innerText = `Hello, ${tg.initDataUnsafe.user.first_name}`;
            } else {
                document.getElementById('gatekeeper').classList.remove('hidden');
            }
        }

        async function verifyTask(amount) {
            const res = await fetch(`${api}/api/update-balance`, { method: 'POST', body: JSON.stringify({ userId, amount }), headers: {'Content-Type': 'application/json'} });
            const data = await res.json();
            document.getElementById('balance').innerText = data.balance;
            tg.showPopup({ message: "Task Verified!" });
        }

        function copyLink() {
            navigator.clipboard.writeText(`https://t.me/YourBot?start=ref_${userId}`);
            tg.showPopup({ message: "Link copied!" });
        }

        async function withdraw() {
            const data = { userId, method: document.getElementById('method').value, accountNum: document.getElementById('accNum').value, accountName: document.getElementById('accName').value };
            await fetch(`${api}/api/withdraw`, { method: 'POST', body: JSON.stringify(data), headers: {'Content-Type': 'application/json'} });
            tg.showPopup({ message: "Withdrawal request sent to admin!" });
        }

        init();
    </script>
</body>
</html>
