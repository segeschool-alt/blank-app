<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Pay</title>
    <!-- Tailwind CSS for modern design -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

    <!-- Header -->
    <header class="bg-blue-900 p-4 text-center text-white text-2xl font-bold shadow-lg">
        CLICK PAY
    </header>

    <div class="p-4">
        <!-- Dashboard (Ads/Stats) -->
        <div class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-blue-500">
                <p class="text-sm text-gray-500">Active Ads</p>
                <h2 class="text-xl font-bold">12</h2>
            </div>
            <div class="bg-white p-6 rounded-xl shadow-md border-l-4 border-green-500">
                <p class="text-sm text-gray-500">Total Balance</p>
                <h2 class="text-xl font-bold">$45.00</h2>
            </div>
        </div>

        <!-- Main Buttons -->
        <div class="flex flex-col gap-4">
            <button class="w-full bg-blue-600 text-white py-4 rounded-lg font-bold shadow-lg hover:bg-blue-700 transition">
                MY BALANCE
            </button>
            <button onclick="showWithdrawOptions()" class="w-full bg-green-600 text-white py-4 rounded-lg font-bold shadow-lg hover:bg-green-700 transition">
                WITHDRAW TO BANK
            </button>
        </div>
    </div>

    <script>
        function showWithdrawOptions() {
            alert("የሀገር መምረጫ ገጽ ይከፈታል...");
            // ወደፊት እዚህ ጋር ነው የሀገር መምረጫውን የምንጨምረው
        }
    </script>
</body>
</html>
