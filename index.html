<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Pay</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- ቻናል መቀላቀል ግዴታ የሆነበት የዌልካም ስክሪን -->
    <div id="join-screen" class="screen">
        <h1>እንኳን ወደ Click Pay በደህና መጡ!</h1>
        <p>ከመቀጠልዎ በፊት ቻናላችንን መቀላቀል አለብዎት።</p>
        <button id="join-btn" onclick="checkJoin()">ቻናል ለመቀላቀል እዚህ ይጫኑ</button>
    </div>

    <!-- ዋና ገጽ (በነባሪ ተደብቋል) -->
    <div id="main-content" class="screen" style="display:none;">
        <header><h1>CLICK PAY</h1></header>
        
        <div class="stats">
            <div class="card">Active Ads: 12</div>
            <div class="card">Total Balance: $45.00</div>
        </div>

        <div class="menu-buttons">
            <button class="btn" onclick="showPage('home')">Home</button>
            <button class="btn" onclick="showPage('balance')">My Balance</button>
            <button class="btn" onclick="showPage('withdraw')">Withdraw to Bank</button>
            <button class="btn" onclick="showPage('tasks')">More Tasks</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
