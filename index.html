<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Pay App</title>
    <style>
        body { background-color: #0f172a; color: #f8fafc; font-family: sans-serif; padding: 20px; margin: 0; }
        .header { color: #22d3ee; font-size: 24px; font-weight: bold; margin-bottom: 20px; }
        .balance-card { background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #334155; }
        .balance-amount { font-size: 32px; font-weight: bold; margin: 10px 0; color: #fff; }
        .btn-group { display: flex; gap: 10px; justify-content: center; margin-top: 15px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; }
        .recharge { background: #10b981; color: white; }
        .withdraw { background: #334155; color: white; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .task-box { background: #1e293b; padding: 20px; border-radius: 15px; text-align: center; border: 1px solid #334155; }
    </style>
</head>
<body>

    <div class="header">CLICK PAY</div>

    <div class="balance-card">
        <div>REMAINING BALANCE</div>
        <div class="balance-amount">Br 7,000.00</div>
        <div class="btn-group">
            <button class="btn recharge">Recharge</button>
            <button class="btn withdraw" onclick="showEmptyButtons()">Withdraw</button>
        </div>
    </div>

    <!-- ይህ ክፍል Withdraw ሲነካ ይዘመናል -->
    <div id="dynamic-content" class="grid">
        <div class="task-box">Smart Mining</div>
        <div class="task-box">Daily Bonus</div>
    </div>

    <script>
        function showEmptyButtons() {
            const container = document.getElementById('dynamic-content');
            // ይዘቱን ባዶ አድርጎ 4 ባዶ በተኖችን ይፈጥራል
            container.innerHTML = `
                <div class="task-box" style="height:50px;"></div>
                <div class="task-box" style="height:50px;"></div>
                <div class="task-box" style="height:50px;"></div>
                <div class="task-box" style="height:50px;"></div>
            `;
        }
    </script>
</body>
</html>
